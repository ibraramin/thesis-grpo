# ═══════════════════════════════════════════════════════════════
# Dynamic Reward-Gating in GRPO — Single Config Source of Truth
# ═══════════════════════════════════════════════════════════════

model:
  name: "Qwen/Qwen2.5-1.5B"
  load_in_4bit: true
  lora_r: 256               # revise2.md §7: uniform high-rank for flat GRPO gradients
  lora_alpha: 512           # α = 2×r per convention
  lora_targets:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  sft:
    dataset: "open-r1/OpenR1-Math-220k"
    max_samples: 10000          # revision.md: 10K for dense behavioral imitation
    epochs: 2                   # 2 epochs for format imprint (was 1)
    learning_rate: 5.0e-6
    batch_size: 8               # effective batch 8×8=64 (revision.md §7)
    gradient_accumulation_steps: 8
    warmup_ratio: 0.1
    max_seq_length: 2048

  grpo:
    dataset: "nvidia/OpenMathInstruct-2"  # local: data/openmath_instruct_2_grpo.jsonl
    max_samples: 1287           # use all filtered prompts
    epochs: 1
    learning_rate: 1.0e-5       # revise2.md §7.3: LoRA needs 10× larger LR than full FT
    warmup_ratio: 0.1
    num_generations: 4         # G=4 — proven fast and effective
    max_prompt_length: 256      # validation-proven
    max_completion_length: 512  # validation-proven
    gradient_accumulation_steps: 4  # 322 optimizer steps (1287/4), above 300 minimum
    vllm_memory_utilization: 0.65  # validation-proven
    beta: 0.04                # KL penalty coefficient
    epsilon: 0.2              # PPO clip range
    difficulty_scale: true     # DW-GRPO: λ_correct(q) = 1 + α·Var(rewards)
    difficulty_alpha: 0.5     # difficulty sensitivity coefficient
    filter_probe:
      enabled: false           # Disabled: all-zero filter too strict for 1.5B
      group_size: 2
      max_completion_length: 1024
      batch_size: 4

  # ── Offline Dataset Filter (§3.1) ─────────────────────────────
  # Runs vLLM inference once against 30K prompts to find
  # "solvable" problems for GRPO training. Prevents format-reward
  # hacking when the model cannot solve a problem at all.
  filter_offline:
    input_prompts: 5000        # probes per run (faster; ~3K retained at 60%)
    g: 8                       # generations per prompt
    max_completion: 512
    output: "outputs/filtered_grpo/filtered_dataset.jsonl"

  stabilization:
    pspo_enabled: true
    pspo_delta: 0.1           # smoothing coefficient δ
    entropy_filter_enabled: false  # disabled: 152K-vocab model entropy always > ln(2); PSPO+K3 KL sufficient
    entropy_threshold: 0.693  # ln(2)
    kl_estimator: "k3"        # "k1" | "k3" (Schulman unbiased)
    sign_advantage: true       # A=2r-1 instead of group-mean normalization (revise2.md §4.1)

# ── Experimental Cohorts ──────────────────────────────────────
# Each entry: {correctness, format, graduated, dynamic}
#   graduated: use continuous reward (0.2/0.5/1.0 tiers)
#   dynamic:   format weight decays as λ_format(t) = 1.0 * e^(-γ*t)
cohorts:
  baseline:
    correctness: 1.0
    format: 0.0
    graduated: false
    dynamic: false
  A:
    correctness: 0.5
    format: 1.5
    graduated: false
    dynamic: false
  B:
    correctness: 1.5
    format: 0.2
    graduated: false
    dynamic: false
  C:
    correctness: 1.0
    format: 0.2
    graduated: true
    dynamic: false
  D:
    correctness: 1.0
    format: 1.0        # initial; decays
    graduated: false
    dynamic: true
    gamma: 0.005        # decay coefficient (slower: half-life ~139 opt-steps)

# ── Evaluation ─────────────────────────────────────────────────
evaluation:
  benchmarks:
    - math500
    - aime24
    - gsm8k
    - svamp
  num_seeds: 2
  max_new_tokens: 512
  temperature: 0.0          # greedy

# ── Test-Run Overrides (for --test-run flag) ────────────────────
# These values replace the corresponding training/eval fields
# when running in test mode. Designed to complete in <2 min on a
# single GPU while exercising every pipeline stage.
test_run:
  sft_max_samples: 10
  grpo_max_samples: 10
  eval_max_samples: 3
  num_generations: 4        # G=4 instead of 16
  max_completion_length: 128
  max_new_tokens: 64
  num_seeds: 1              # single seed
  epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 1
  report_file: "outputs/test_run/report.txt"
  output_dir: "outputs/test_run"
